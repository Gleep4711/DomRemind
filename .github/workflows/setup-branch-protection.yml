name: Setup Branch Protection

# Run this workflow manually ONCE (after merging this PR) to configure branch
# protection rules for the main branch. After it runs, GitHub will enforce:
#   - Pull Request required before merging into main
#   - At least 1 approving review required (must be from a code owner, i.e. Gleep4711)
#   - Direct pushes to main are restricted to Gleep4711 only
#   - Force-pushes and branch deletions are disabled
#
# Prerequisites:
#   Create a Personal Access Token (PAT) with the "repo" scope and add it to
#   the repository secrets as ADMIN_PAT:
#   Settings → Secrets and variables → Actions → New repository secret

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    protect-main:
        runs-on: ubuntu-latest
        steps:
            - name: Configure branch protection for main
              env:
                  GH_TOKEN: ${{ secrets.ADMIN_PAT }}
              run: |
                  curl -L \
                    -X PUT \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    https://api.github.com/repos/${{ github.repository }}/branches/main/protection \
                    -d '{
                      "required_status_checks": null,
                      "enforce_admins": false,
                      "required_pull_request_reviews": {
                        "dismiss_stale_reviews": true,
                        "require_code_owner_reviews": true,
                        "required_approving_review_count": 1
                      },
                      "restrictions": {
                        "users": ["Gleep4711"],
                        "teams": [],
                        "apps": []
                      },
                      "allow_force_pushes": false,
                      "allow_deletions": false
                    }'
